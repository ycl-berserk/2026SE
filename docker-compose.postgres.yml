name: 2026se-postgres

services:
  db-postgres:
    image: postgres:16
    container_name: 2026se-db-postgres
    environment:
      POSTGRES_DB: ruc_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ruc_platform"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./demo
      dockerfile: Dockerfile
    container_name: 2026se-app
    depends_on:
      db-postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker-postgres
      DB_HOST: db-postgres
      DB_PORT: 5432
      DB_NAME: ruc_platform
      DB_USER: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: 18080
    ports:
      - "18080:18080"

volumes:
  postgres_data:
