spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:db-postgres}:${DB_PORT:5432}/${DB_NAME:ruc_platform}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1200000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    baseline-description: Initial baseline for Docker PostgreSQL
    clean-disabled: true
    validate-on-migrate: true

mybatis-plus:
  global-config:
    db-config:
      db-type: postgresql
