# PostgreSQL 数据库配置（开发环境）
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/ruc_platform
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1200000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    baseline-description: Initial baseline for PostgreSQL
    clean-disabled: true
    validate-on-migrate: true

# MyBatis-Plus 数据库类型配置
mybatis-plus:
  global-config:
    db-config:
      db-type: postgresql

# 日志配置
logging:
  level:
    com.ruc.platform: debug
    com.ruc.platform.mapper: debug
    org.mybatis: debug
