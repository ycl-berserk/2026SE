# 人大金仓数据库（使用 PostgreSQL 协议连接）
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:54321/test
spring.datasource.username=system
spring.datasource.password=123456

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# MyBatis-Plus 配置
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0
# 指定数据库类型为 PostgreSQL（人大金仓兼容 PostgreSQL 协议）
mybatis-plus.global-config.db-config.db-type=postgresql

# Sa-Token 配置
sa-token.token-name=Authorization
sa-token.timeout=86400
sa-token.active-timeout=-1
sa-token.is-concurrent=true
sa-token.token-style=uuid
sa-token.is-log=false

# Flyway 配置（人大金仓 - 使用 PostgreSQL 协议兼容模式）
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.baseline-description=Initial baseline for KingbaseES (PostgreSQL compatible)
spring.flyway.encoding=UTF-8
spring.flyway.clean-disabled=true
spring.flyway.validate-on-migrate=true
spring.flyway.placeholder-replacement=false